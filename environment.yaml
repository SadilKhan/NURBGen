name: nurbgen

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.11

  # ── pip ───────────────────────────────────────────────────────────────────
  - pip
  - pip:
      # ── PyTorch (CUDA 12.6) ───────────────────────────────────────────
      # Installed via pip wheels — conda pytorch-cuda metapackage doesn't
      # ship 12.6.  The extra index carries the cu126-tagged builds.
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.7.1
      - torchvision==0.22.1
      - torchaudio==2.7.1

      # ── LLM / Fine-tuning core ─────────────────────────────────────────
      - ms-swift==3.5.0
      - transformers==4.52.3
      - peft==0.15.2
      - accelerate==1.9.0
      - trl==0.18.0
      - deepspeed==0.17.2
      - tokenizers==0.21.1
      - safetensors==0.5.3
      - sentencepiece==0.2.0

      # ── Hugging Face ecosystem ─────────────────────────────────────────
      - huggingface-hub==0.32.2
      - datasets==3.3.2
      - evaluate                    # not in freeze but recommended
      - hf-xet==1.1.2

      # ── Flash Attention ────────────────────────────────────────────────
      # Pre-built wheel — install manually after env creation:
      #   pip install flash_attn-2.8.0.post2+cu12torch2.7...whl
      # - flash_attn==2.8.0.post2

      # ── Inference & serving ────────────────────────────────────────────
      - openai==1.82.0
      - fastapi==0.115.12
      - uvicorn==0.34.2
      - starlette==0.46.2
      - gradio==5.31.0
